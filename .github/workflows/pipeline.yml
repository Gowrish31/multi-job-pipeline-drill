name: CI Pipeline

on:
  push:
    branches: ['*']
    branches: [fix/pipeline-orchestration]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      # Wait for lint so unit tests only run after static validation succeeds.
      - lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      # Wait for lint so the build only runs after the code is validated.
      - lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      # Wait for the build artifact to exist before integration tests execute.
      - build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: app-build
          path: dist/
      - run: npm run test:integration

  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    needs:
      # Prevent staging deployment until the relevant validation checks succeed.
      - unit-tests
      - integration-tests
    steps:
      - run: echo "Deploying to staging environment"

  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    needs:
      # Ensure production only deploys after staging has completed successfully.
      - deploy-staging
    steps:
      - run: echo "Deploying to production environment"

  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    needs:
      # Always report the pipeline outcome even when earlier jobs fail.
      - lint
      - unit-tests
      - build
      - integration-tests
      - deploy-staging
      - deploy-production
    steps:
      - run: echo "Pipeline notification sent"
